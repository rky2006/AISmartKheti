<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Restore path redirected via 404.html for GitHub Pages SPA routing.
      (function () {
        var query = window.location.search;
        if (query) {
          var params = new URLSearchParams(query);
          var p = params.get('p');
          var h = params.get('h') || '';
          if (p !== null) {
            var path = '/AISmartKheti' + decodeURIComponent(p);
            window.history.replaceState(null, null, path + decodeURIComponent(h));
          }
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#863bff" />
    <meta name="description" content="AISmartKheti - AI-powered smart farming application for crop health diagnosis, market prices, farming advisory and more" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wdth,wght@100,400;100,700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <title>AISmartKheti - Smart Farming</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
